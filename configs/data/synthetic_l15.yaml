# Full-resolution synthetic dataset on the project (1°, poles excluded) grid.
_target_: mpinv.cli._builders.build_data_pipeline
grid:
  n_phi: 360
  n_theta: 179
  theta_start_deg: 1.0
  theta_end_deg: 179.0
l_max: 15
n_train: 8192
n_val: 1024
seed_train: 1234
seed_val: 5678
generator:
  mode: gaussian
  family_balance: 0.5
  coef_scale: 1.0
  mode_dropout_prob: 0.0
batch_size: 64
num_workers: 2
