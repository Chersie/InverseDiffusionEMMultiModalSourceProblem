# Tiny synthetic dataset on a small grid; Phase B vertical-slice default.
_target_: mpinv.cli._builders.build_data_pipeline
grid:
  n_phi: 24
  n_theta: 12
  theta_start_deg: 7.5
  theta_end_deg: 172.5
l_max: 4
n_train: 256
n_val: 64
seed_train: 1234
seed_val: 5678
generator:
  mode: gaussian
  family_balance: 0.5
  coef_scale: 1.0
  mode_dropout_prob: 0.0
batch_size: 32
num_workers: 0
