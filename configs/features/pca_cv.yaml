# Composite features: PCA on power + radial FFT + SH power.
# Wired in train.py because the CompositePipeline takes a list of extractors,
# which Hydra cannot fully express via _target_ alone.
kind: composite
pca:
  input_mode: power
  log_input: false
  pca_components: 64
  pca_whiten: false
  pca_random_state: 0
  normalise_features: true
  normalise_targets: true
extractors:
  - name: fft_radial
    n_bins: 16
    sin_theta_window: true
    log1p: true
    input_mode: power
  - name: sh_power
    log1p: true
    input_mode: power
normalise_concat: true
