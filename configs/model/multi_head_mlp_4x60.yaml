# MultiHeadMLP at L=5 with mlp_4x60 backbone (60x4 flat / ELU / no LayerNorm /
# dropout=0.001) and one head per l-band. Output dim is fixed by L=5:
# 4 * 5 * (5 + 2) = 140.
_target_: mpinv.models.multi_head_mlp.MultiHeadMLP
cfg:
  _target_: mpinv.models.multi_head_mlp.MultiHeadMLPConfig
  input_dim: ???
  output_dim: 140
  l_max: 5
  groups:
    - [1]
    - [2]
    - [3]
    - [4]
    - [5]
  hidden_size: 60
  n_hidden_layers: 4
  architecture: flat
  dropout: 0.001
  use_layer_norm: false
  use_bias: true
  activation: elu
