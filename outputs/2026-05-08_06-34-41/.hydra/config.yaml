data:
  _target_: mpinv.cli._builders.build_data_pipeline
  grid:
    n_phi: 360
    n_theta: 179
    theta_start_deg: 1.0
    theta_end_deg: 179.0
  l_max: 15
  n_train: 2048
  n_val: 512
  n_test: 512
  seed_train: 1234
  seed_val: 5678
  seed_test: 9012
  generator:
    mode: gaussian
    family_balance: 0.5
    coef_scale: 1.0
    mode_dropout_prob: 0.0
  augmentation: null
  aug_seed: 4242
  batch_size: 64
  num_workers: 0
features:
  _target_: mpinv.features.power_pipeline.PowerPCAPipeline
  cfg:
    _target_: mpinv.features.power_pipeline.PowerPCAPipelineConfig
    input_mode: power
    log_input: false
    pca_components: 128
    pca_whiten: false
    pca_random_state: 0
    normalise_features: true
    normalise_targets: true
model:
  _target_: mpinv.models.mlp.MLP
  cfg:
    _target_: mpinv.models.mlp.MLPConfig
    input_dim: ???
    output_dim: ???
    hidden_size: 64
    n_hidden_layers: 2
    architecture: flat
    dropout: 0.0
    use_layer_norm: false
    use_bias: true
    activation: silu
loss:
  kind: coef
  _target_: mpinv.losses.coef_mse.CoefMSE
  cfg:
    _target_: mpinv.losses.coef_mse.CoefMSEConfig
    reduction: mean
optimiser:
  _target_: mpinv.training.optim.OptimiserConfig
  name: adamw
  lr: 0.001
  weight_decay: 0.0001
  betas:
  - 0.9
  - 0.999
  eps: 1.0e-08
  fused: false
scheduler:
  _target_: mpinv.training.optim.SchedulerConfig
  name: none
trainer:
  _target_: mpinv.training.trainer.TrainerConfig
  max_epochs: 10
  accum_steps: 1
  log_every_n_steps: 5
  sanity_check: true
  device: cpu
  amp:
    _target_: mpinv.training.amp.AMPConfig
    precision: fp32
callbacks:
  log_every_n_steps: 5
  checkpoint_every_n_epochs: 1
  keep_last_checkpoints: 3
  grad_clip_max_norm: 1.0
  early_stop_patience: 10
  validation_every_n_epochs: 1
tracking:
  _target_: mpinv.tracking.mlflow_sink.MLflowSinkConfig
  tracking_uri: ''
  experiment_name: ''
  disabled: true
experiment_name: mpinv-vertical-slice
seed: 0
run_name: ${now:%Y-%m-%d_%H-%M-%S}
output_dir: ${hydra:runtime.output_dir}
