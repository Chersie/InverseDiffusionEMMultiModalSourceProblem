hydra:
  run:
    dir: outputs/${now:%Y-%m-%d_%H-%M-%S}
  sweep:
    dir: multirun/final_step3_scheduling/${now:%Y-%m-%d_%H-%M-%S}
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params:
      training.backbone_policy: freeze_after_stage1,trainable_always,all_trainable_active_boost
      training.truncate_target_to_active_band: true,false
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: RUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.mode=RUN
    task:
    - data.smoke_test=true
    - data.n_source=20
    - data.n_train_sources=15
    - data.n_augmented=64
    - data.n_holdout_samples=0
    - data.include_synthetic_test=false
    - data.scale_factor=1.0
    - trainer.max_epochs=1
    - training.stage_max_epochs=1
    - training.backbone_policy=all_trainable_active_boost
    - training.truncate_target_to_active_band=true
    - tracking=mlflow_off
  job:
    name: train
    chdir: false
    override_dirname: data.include_synthetic_test=false,data.n_augmented=64,data.n_holdout_samples=0,data.n_source=20,data.n_train_sources=15,data.scale_factor=1.0,data.smoke_test=true,tracking=mlflow_off,trainer.max_epochs=1,training.backbone_policy=all_trainable_active_boost,training.stage_max_epochs=1,training.truncate_target_to_active_band=true
    id: ???
    num: ???
    config_name: step3_scheduling
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.2
    version_base: '1.3'
    cwd: /Users/chersie/Desktop/diplom_clean
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /Users/chersie/Desktop/diplom_clean/configs
      schema: file
      provider: main
    - path: /Users/chersie/Desktop/diplom_clean/paper/final_experiments
      schema: file
      provider: command-line
    - path: ''
      schema: structured
      provider: schema
    output_dir: /Users/chersie/Desktop/diplom_clean/outputs/2026-06-09_04-50-09
    choices:
      training: staged
      tracking: mlflow_off
      callbacks: default
      trainer: default
      scheduler: none
      optimiser: adamw
      loss: physics_power_rank
      model: multi_head_mlp_4x60
      features: raw_flat
      data: real_augmented_l5
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
