checkpoint:
  save_best: true
  save_frequency: 10
  save_last: true
data:
  generator_mode: random
  scale: 1.0
  seed: 42
device: auto
early_stopping:
  enabled: true
  min_delta: 1e-6
  monitor: val_loss
  patience: 10
experiment:
  description: Basic MLP model for quick testing and validation
  name: mlp_basic
  tags:
  - mlp
  - basic
  - test
model:
  activation: gelu
  dropout_rate: 0.1
  hidden_size: 256
  maxorder: 5
  n_hidden_layers: 2
  type: mlp
num_workers: 4
pin_memory: true
preprocessing:
  normalize_features: true
  normalize_targets: true
  pca_components: 128
  pca_oversample: 8
training:
  amplitude_loss_weight: 1.0
  batch_size: 64
  detailed_metrics_frequency: 10
  epochs: 20
  learning_rate: 0.001
  n_samples: 2000
  test_ratio: 0.1
  train_ratio: 0.7
  val_log_frequency: 5
  val_ratio: 0.2
  weight_decay: 0.0
