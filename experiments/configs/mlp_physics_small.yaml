# Physics-informed MLP training with reduced resolution for testing
# Reduced grid size to ensure gradient flow works properly

experiment:
  name: "mlp_physics_small"
  description: "MLP model with physics-informed loss using reduced resolution for testing"
  tags:
    - "mlp"
    - "physics-informed"
    - "reduced-resolution" 
    - "testing"

data:
  maxorder: 5  # Smaller maxorder for faster testing
  generator_mode: "random"  # Random coefficients
  scale: 1.0
  seed: 42
  
preprocessing:
  pca_components: 250  # Reduced PCA components
  pca_oversample: 16
  pca_iterations: 2
  normalize_features: true
  normalize_targets: true  # Don't normalize P field targets

model:
  model_type: mlp
  hidden_size: 256  # Smaller network for faster testing
  n_hidden_layers: 2
  dropout_rate: 0.05
  activation: relu
  
  # Physics-informed loss configuration
  loss_type: physics  # Use physics loss instead of coefficient MSE
  maxorder: 5
  grid_n_phi: 360      # REDUCED from 360 - known working size
  grid_n_theta: 179    # REDUCED from 179 - known working size  
  physics_grid_type: equiangular
  physics_grid_resolution_factor: 1.0
  physics_field_weight: 5  # Weight for E-field components (if used)

training:
  n_samples: 200  # Smaller dataset for quick testing
  train_ratio: 0.7
  val_ratio: 0.2
  test_ratio: 0.1
  batch_size: 256
  epochs: 10  # Fewer epochs for quick testing
  learning_rate: 0.001  # Conservative learning rate
  weight_decay: 0.0
  val_log_frequency: 2
  detailed_metrics_frequency: 5

compute:
  device: cpu
  seed: 42

streaming:
  force_streaming_above_samples: 1000  # Use in-memory for small dataset

# Test Dataset
test_dataset:
  evaluate: true
  limit: 50  # Small test set for quick validation

# Plotting Configuration
plotting:
  n_sample_plots: 5  # Number of individual sample plots to generate
  plot_validation_samples: true  # Generate plots for validation samples during training
  plot_test_samples: true  # Generate plots for test samples during evaluation

# Device and Performance  
device: "cpu"  # Use CPU to avoid MPS issues
num_workers: 8
pin_memory: false

# Checkpointing
checkpoint:
  save_best: true
  save_last: true
  save_frequency: 5
  
# Early Stopping
early_stopping:
  enabled: false  # Disable for quick testing
  patience: 5
  min_delta: 1e-6