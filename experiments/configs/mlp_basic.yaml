# Basic MLP Configuration for Testing
experiment:
  name: "mlp_basic"
  description: "Basic MLP model for quick testing and validation"
  tags:
    - "mlp"
    - "basic"
    - "test"

# Model Configuration
model:
  type: "mlp"
  maxorder: 5
  hidden_size: 256
  n_hidden_layers: 2
  dropout_rate: 0.1
  activation: "gelu"

# Training Configuration  
training:
  n_samples: 20000  # Reasonable size for testing
  epochs: 10
  batch_size: 256
  learning_rate: 0.001
  weight_decay: 0.0
  
  # Loss configuration
  amplitude_loss_weight: 1.0
  
  # Validation
  train_ratio: 0.7
  val_ratio: 0.2
  test_ratio: 0.1
  
  # Logging
  val_log_frequency: 5
  detailed_metrics_frequency: 10
  
# Data Configuration
data:
  generator_mode: "random"  # "random" or "fixed"
  scale: 1.0
  seed: 42
  
# Preprocessing
preprocessing:
  pca_components: 128
  pca_oversample: 8
  normalize_features: true
  normalize_targets: true

# Test Dataset
test_dataset:
  evaluate: true
  limit: 10  # Set to null to evaluate on all available test samples

# Device and Performance
device: "auto"  # "auto", "cpu", "cuda", "mps"
num_workers: 4
pin_memory: true

# Checkpointing
checkpoint:
  save_best: true
  save_last: true
  save_frequency: 10  # Save every N epochs
  
# Early Stopping
early_stopping:
  enabled: true
  patience: 10
  min_delta: 1e-6
  monitor: "val_loss"