# Large MLP Configuration for Production Training
experiment:
  name: "mlp_large"
  description: "Large MLP model for high-performance multipole prediction"
  tags:
    - "mlp"
    - "large"
    - "production"

# Model Configuration
model:
  type: "mlp"
  maxorder: 5
  hidden_size: 512
  n_hidden_layers: 2
  dropout_rate: 0.15
  activation: "gelu"

# Training Configuration
training:
  n_samples: 10000
  epochs: 20
  batch_size: 512
  learning_rate: 0.0015
  weight_decay: 1e-5
  
  # Loss configuration
  amplitude_loss_weight: 1.0
  
  # Validation
  train_ratio: 0.8
  val_ratio: 0.1
  test_ratio: 0.1
  
  # Logging
  val_log_frequency: 10
  detailed_metrics_frequency: 25
  
  # Learning rate scheduling
  lr_scheduler:
    type: "reduce_on_plateau"
    factor: 0.5
    patience: 20
    min_lr: 1e-6

# Data Configuration
data:
  generator_mode: "random"
  scale: 1.0
  seed: 42
  
# Preprocessing
preprocessing:
  pca_components: 256
  pca_oversample: 16
  normalize_features: true
  normalize_targets: true

# Test Dataset
test_dataset:
  evaluate: true
  limit: null  # Evaluate on all available test samples

# Device and Performance
device: "auto"
num_workers: 8
pin_memory: true
mixed_precision: true  # Use automatic mixed precision if available

# Checkpointing
checkpoint:
  save_best: true
  save_last: true
  save_frequency: 25
  
# Early Stopping
early_stopping:
  enabled: true
  patience: 30
  min_delta: 1e-6
  monitor: "val_loss"