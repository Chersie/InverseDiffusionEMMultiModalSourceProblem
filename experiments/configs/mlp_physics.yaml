# Physics-Informed Loss MLP Configuration
# Memory-Efficient: Uses batched data generation and processing
experiment:
  name: "mlp_physics"
  description: "MLP model with physics-informed loss optimizing for P field accuracy"
  tags:
    - "mlp"
    - "physics-informed" 
    - "p-field"
    - "memory-efficient"

# Model Configuration
model:
  type: "mlp"
  maxorder: 5  # Smaller maxorder for initial testing
  hidden_size: 512  # Smaller network for faster training
  n_hidden_layers: 2
  dropout_rate: 0.05
  activation: "gelu"
  
  # Physics Loss Configuration
  loss_type: "physics"  # Enable physics-informed loss
  grid_n_theta: 179     # Smaller grid for faster computation
  grid_n_phi: 360
  physics_grid_type: "equiangular"
  physics_grid_resolution_factor: 1.0
  physics_field_weight: 0.5

# Training Configuration  
training:
  n_samples: 2000    # Conservative size to test memory fixes first
  epochs: 5         # Reasonable epochs for testing
  batch_size: 256     # Small batches for memory safety
  learning_rate: 0.01
  weight_decay: 0.0
  
  # Validation
  train_ratio: 0.7
  val_ratio: 0.2
  test_ratio: 0.1
  
  # Logging
  val_log_frequency: 2
  detailed_metrics_frequency: 5
  
# Data Configuration
data:
  generator_mode: "random"  # Random coefficients
  scale: 1.0
  seed: 42
  
# Preprocessing
preprocessing:
  pca_components: 128  # Memory-efficient PCA components
  pca_oversample: 8    # Reduced oversample for memory efficiency
  normalize_features: true
  normalize_targets: false  # Disable target normalization for P field targets

# Test Dataset
test_dataset:
  evaluate: true
  limit: 100  # Small test set for quick validation

# Device and Performance
device: "cpu"  # Use CPU to avoid MPS issues
num_workers: 4
pin_memory: false

# Plotting Configuration
plotting:
  n_sample_plots: 8  # More plots for full-scale training
  plot_validation_samples: true  # Generate plots for validation samples during training
  plot_test_samples: true  # Generate plots for test samples during evaluation

# Checkpointing
checkpoint:
  save_best: true
  save_last: true
  save_frequency: 5
  
# Early Stopping
early_stopping:
  enabled: false  # Disable for quick testing
  patience: 5
  min_delta: 1e-6
  monitor: "val_loss"