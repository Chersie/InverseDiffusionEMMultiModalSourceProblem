# Baseline Models Configuration for Comparison
experiment:
  name: "baseline_comparison"
  description: "Baseline Ridge regression models for comparison with neural networks"
  tags:
    - "baseline"
    - "ridge"
    - "comparison"

# Model Configuration
model:
  type: "baseline"
  maxorder: 15
  baseline_type: "ridge"  # "ridge", "linear", "lasso"
  ridge_alpha: 1.0
  max_iter: 1000

# Training Configuration
training:
  n_samples: 50000
  
  # Validation splits
  train_ratio: 0.8
  val_ratio: 0.1 
  test_ratio: 0.1

# Data Configuration
data:
  generator_mode: "random"
  scale: 1.0
  seed: 42

# Preprocessing
preprocessing:
  pca_components: 512
  pca_oversample: 16
  normalize_features: true
  normalize_targets: false  # Ridge handles this internally

# Device
device: "cpu"  # Baseline models use scikit-learn (CPU)