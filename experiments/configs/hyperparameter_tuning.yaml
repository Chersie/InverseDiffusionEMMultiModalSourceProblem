# Hyperparameter Optimization Configuration
# Advanced hyperparameter tuning for electromagnetic multipole MLP models

experiment:
  name: "mlp_hyperparameter_optimization"
  description: "Systematic hyperparameter optimization for MLP models using Optuna"
  tags: ["hyperparameter_tuning", "optuna", "mlp", "optimization"]

# Data configuration
data:
  maxorder: 5
  n_samples: 2000  # Larger dataset for robust optimization
  n_phi: 64
  n_theta: 32
  scale: 1.0

# Optimization configuration
optimization:
  n_trials: 100
  timeout: 7200  # 2 hours
  n_jobs: 1
  direction: "minimize"
  objective_metric: "val_loss"
  
  # Sampler configuration
  sampler: "tpe"  # Tree-structured Parzen Estimator
  sampler_kwargs:
    n_startup_trials: 10
    n_ei_candidates: 24
  
  # Pruning configuration
  enable_pruning: true
  pruner: "median"
  pruner_kwargs:
    n_startup_trials: 5
    n_warmup_steps: 10
    interval_steps: 1
  
  # Early stopping
  early_stopping_rounds: 10
  min_improvement: 1e-6
  
  # Resource constraints
  max_epochs_per_trial: 50
  min_epochs_per_trial: 10

# Search space definition
search_space:
  hidden_size:
    type: "categorical"
    choices: [128, 256, 512, 1024]
  
  n_hidden_layers:
    type: "int"
    low: 2
    high: 6
  
  dropout_rate:
    type: "float"
    low: 0.0
    high: 0.5
  
  learning_rate:
    type: "float"
    low: 1e-5
    high: 1e-2
    log: true
  
  batch_size:
    type: "categorical"
    choices: [32, 64, 128, 256]
  
  weight_decay:
    type: "float"
    low: 1e-6
    high: 1e-2
    log: true
  
  # Additional optimizer parameters
  optimizer:
    type: "categorical"
    choices: ["adam", "adamw", "sgd"]
  
  lr_scheduler:
    type: "categorical"
    choices: ["none", "step", "cosine", "reduce_on_plateau"]
  
  # Model architecture variations
  activation:
    type: "categorical"
    choices: ["relu", "gelu", "swish", "leaky_relu"]

# Preprocessing configuration
preprocessing:
  pca_components: 200
  normalize_features: true
  normalize_targets: true

# Training configuration for trials
training:
  validation_split: 0.2
  test_split: 0.1
  shuffle: true
  random_seed: 42
  
  # Early stopping for individual trials
  patience: 5
  min_delta: 1e-6
  
  # Checkpointing
  save_best_model: true
  save_last_model: false

# MLFlow integration
mlflow:
  experiment_name: "electromagnetic_multipole_hyperopt"
  track_system_metrics: true
  log_models: false  # Don't log all trial models (too many)
  log_plots: false   # Don't generate plots for all trials
  
  # Only log best N models
  log_top_n_models: 5

# Analysis configuration
analysis:
  # Generate optimization analysis plots
  create_optimization_plots: true
  
  # Parameter importance analysis
  analyze_parameter_importance: true
  
  # Generate optimization report
  create_optimization_report: true
  
  # Export best configurations
  export_best_configs: true
  n_best_configs: 10