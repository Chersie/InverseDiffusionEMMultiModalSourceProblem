hydra:
  run:
    dir: outputs/${now:%Y-%m-%d_%H-%M-%S}
  sweep:
    dir: multirun/final_step1_rank/${now:%Y-%m-%d_%H-%M-%S}
    subdir: ${hydra.job.num}_rank_${hydra.job.override_dirname}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params:
      loss.rank_bin_weight: 0.001,0.01,0.1,1.0,10.0
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: MULTIRUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra: []
    task:
    - data.smoke_test=true
    - data.n_source=20
    - data.n_train_sources=15
    - data.n_augmented=64
    - data.n_holdout_samples=0
    - data.include_synthetic_test=false
    - data.scale_factor=1.0
    - trainer.max_epochs=1
    - trainer.sanity_check=true
    - tracking=mlflow_off
    - loss.rank_bin_weight=0.01,1.0
  job:
    name: train
    chdir: false
    override_dirname: data.include_synthetic_test=false,data.n_augmented=64,data.n_holdout_samples=0,data.n_source=20,data.n_train_sources=15,data.scale_factor=1.0,data.smoke_test=true,loss.rank_bin_weight=0.01,1.0,tracking=mlflow_off,trainer.max_epochs=1,trainer.sanity_check=true
    id: ???
    num: ???
    config_name: step1_rank
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.2
    version_base: '1.3'
    cwd: /Users/chersie/Desktop/diplom_clean
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /Users/chersie/Desktop/diplom_clean/configs
      schema: file
      provider: main
    - path: /Users/chersie/Desktop/diplom_clean/paper/final_experiments
      schema: file
      provider: command-line
    - path: ''
      schema: structured
      provider: schema
    output_dir: ???
    choices:
      tracking: mlflow_off
      callbacks: default
      trainer: default
      scheduler: none
      optimiser: adamw
      loss: physics_power_rank
      model: mlp_5x200
      features: raw_flat
      data: real_augmented_l5
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
data:
  _target_: mpinv.data.real_augmented_pipeline.build_real_augmented_pipeline
  grid:
    n_phi: 360
    n_theta: 179
    theta_start_deg: 1.0
    theta_end_deg: 179.0
  l_max: 5
  holdout_root: data/raw/real_antenna
  feature_subdir: E_in_plane
  n_source: 20
  n_train_sources: 15
  n_augmented: 64
  n_holdout_samples: 0
  shuffle_seed: 42
  holdout_shuffle_seed: 314159
  aug_seed: 4242
  dropout_prob: 0.1
  field_sigma: 1.0e-08
  scale_factor: 1.0
  aug_chunk_size: 500
  include_synthetic_test: false
  n_synthetic_test: 512
  seed_synthetic_test: 9012
  smoke_test: true
  batch_size: 64
  num_workers: 0
features:
  _target_: mpinv.features.raw_flat.RawFlattenPipeline
  cfg:
    _target_: mpinv.features.raw_flat.RawFlattenPipelineConfig
    input_mode: power
    log_input: false
    normalise_features: true
model:
  _target_: mpinv.models.mlp.MLP
  cfg:
    _target_: mpinv.models.mlp.MLPConfig
    input_dim: ???
    output_dim: ???
    hidden_size: 200
    n_hidden_layers: 5
    architecture: flat
    dropout: 0.001
    use_layer_norm: false
    use_bias: true
    activation: elu
loss:
  kind: physics
  _target_: mpinv.cli._builders.build_physics_power_loss
  log_ratio: false
  log_eps: 1.0e-12
  coef_aux_weight: 0.0
  rank_bin_weight: 0.1
  rank_bin_n_bins: null
  rank_bin_beta: 10.0
optimiser:
  _target_: mpinv.training.optim.OptimiserConfig
  name: adamw
  lr: 0.001
  weight_decay: 0.0
  betas:
  - 0.9
  - 0.999
  eps: 1.0e-08
  fused: false
scheduler:
  _target_: mpinv.training.optim.SchedulerConfig
  name: none
trainer:
  _target_: mpinv.training.trainer.TrainerConfig
  max_epochs: 1
  accum_steps: 1
  log_every_n_steps: 20
  sanity_check: true
  device: cpu
  amp:
    _target_: mpinv.training.amp.AMPConfig
    precision: fp32
callbacks:
  log_every_n_steps: 5
  checkpoint_every_n_epochs: 1
  keep_last_checkpoints: 3
  grad_clip_max_norm: 1.0
  early_stop_patience: 10
  validation_every_n_epochs: 1
tracking:
  _target_: mpinv.tracking.mlflow_sink.MLflowSinkConfig
  tracking_uri: ''
  experiment_name: ''
  disabled: true
experiment_name: final_step1_rank
seed: 0
run_name: ${now:%Y-%m-%d_%H-%M-%S}
output_dir: ${hydra:runtime.output_dir}
